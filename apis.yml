name: DevOps
description: DevOps is a cultural and technical movement that combines software development
  and IT operations to shorten the development lifecycle and deliver high-quality
  software continuously. It emphasizes automation, collaboration, monitoring, and
  infrastructure as code to bridge the gap between building software and running it
  in production.
